<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LINEプロフィール用画像比率チェンジャー</title>
</head>

<body>
  <h1>LINEプロフィール用画像比率チェンジャー</h1>
  <div id="canvas-wrapper">
    <cropper-canvas background>
      <cropper-image id="editor-image" src="" scalable skewable translatable></cropper-image>
      <cropper-selection movable resizable>
        <cropper-handle action="move"></cropper-handle>
        <cropper-handle action="ne-resize"></cropper-handle>
        <cropper-handle action="nw-resize"></cropper-handle>
        <cropper-handle action="se-resize"></cropper-handle>
        <cropper-handle action="sw-resize"></cropper-handle>
      </cropper-selection>
    </cropper-canvas>
  </div>
  <div id="control-wrapper">
    <button id="upload-image">画像ファイルをアップロード</button>
    <input type="file" id="uploader" class="none" accept=".jpg,.png,.jpeg">
    <button id="rotate-btn" class="none">90度回転</button>
    <button id="save-btn" class="none">保存</button>
  </div>
  <footer>&copy;Manmen2414 <a href="https://github.com/manmen2414/LINE-Deco-SimpleFrame" target="_blank">Github</a>
  </footer>
</body>

</html>
